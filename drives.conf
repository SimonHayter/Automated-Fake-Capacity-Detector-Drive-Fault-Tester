# ============================================================================
#  drives.conf - list of drives to be tested by test.sh
# ============================================================================
#
#  Lines starting with '#' are comments and are ignored.
#  Only the DRIVES=(...) line at the bottom is read by the script.
#
# ----------------------------------------------------------------------------
#  FORMAT
# ----------------------------------------------------------------------------
#
#  DRIVES=(name1, name2, name3)
#
#    - Names are separated by commas
#    - Do NOT use quotes around names
#    - Spaces after the commas are optional (both styles work)
#    - Do NOT include the '/dev/' prefix - just the device name itself
#
#  Examples (all valid):
#
#    DRIVES=(sda, sdb, sdc)
#    DRIVES=(sda,sdb,sdc)
#    DRIVES=(nvme0n1, sda, mmcblk0)
#    DRIVES=(sdb)                       # single drive
#
# ----------------------------------------------------------------------------
#  DEVICE NAMING BY DRIVE TYPE
# ----------------------------------------------------------------------------
#
#    SATA HDDs and SSDs ............ sda, sdb, sdc, ...
#    USB flash drives .............. sda, sdb, sdc, ...
#    USB HDDs / USB SSDs ........... sda, sdb, sdc, ...
#    SD cards via USB reader ....... sda, sdb, sdc, ...
#    SD cards via built-in reader .. mmcblk0, mmcblk1, ...
#    NVMe SSDs (M.2 / U.2 / PCIe) .. nvme0n1, nvme1n1, ...
#
#  Note: nvme?n? naming is ONLY for real NVMe SSDs connected via PCIe.
#  USB flash drives and USB-attached SSDs - no matter how fast - are
#  always sd? because they go through the USB Mass Storage layer.
#
# ----------------------------------------------------------------------------
#  HOW TO FIND YOUR DRIVE NAMES
# ----------------------------------------------------------------------------
#
#  Best method:
#    Open "Disk Health (GSmartControl)" from the Parted Magic desktop.
#    It lists every connected drive with its device name, model, serial,
#    and SMART health status.
#
#  Terminal alternative:
#    lsblk                       # quick list of all block devices
#    lsblk -o NAME,MODEL,SIZE    # with model and capacity
#
# ----------------------------------------------------------------------------
#  IMPORTANT
# ----------------------------------------------------------------------------
#
#  Do NOT include your Parted Magic boot drive in this list.
#  test.sh wipes and reformats every drive it is given.
#  The script will display the drive list and ask you to confirm
#  before doing anything destructive.
#
# ============================================================================

DRIVES=(sda, sdb, sdc)
